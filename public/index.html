<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rokuj.pl – Praca, do której się nadajesz. Albo nadasz.</title>
   <link rel="icon" type="image/png" href="favicon.png">
   <link rel="apple-touch-icon" href="favicon.png">
  

<style>
:root{
  --accent:#F26B1D;
  --accent-soft:#FDEBDD;
  --ink:#1F2328;
  --ink-soft:#6B7280;
  --bg:#F7F8FA;
  --card:#FFFFFF;
  --line:#E5E7EB;
  --ok:#16A34A;   --ok-bg:#EAF7EE;
  --warn:#B45309; --warn-bg:#FEF3E2;
  --bad:#B91C1C;  --bad-bg:#FDEAEA;
  --radius:14px;
  --shadow:0 1px 3px rgba(16,24,40,.06),0 4px 14px rgba(16,24,40,.05);
}
*{box-sizing:border-box;}
body{margin:0;font-family:'Segoe UI',system-ui,-apple-system,Arial,sans-serif;
  background:var(--bg);color:var(--ink);line-height:1.45;}

header.brand{background:var(--card);border-bottom:1px solid var(--line);box-shadow:var(--shadow);}
.brand-inner{max-width:1200px;margin:0 auto;padding:20px 24px;
  display:flex;align-items:center;gap:22px;}
.brand-inner img{height:52px;display:block;}
.brand-divider{width:1px;align-self:stretch;background:var(--line);}
.claim{display:flex;flex-direction:column;justify-content:center;font-size:1.02rem;}
.claim .l1{font-weight:800;color:var(--ink);}
.claim .l2{font-weight:400;color:var(--accent);}
@media (max-width:560px){
  .brand-inner{flex-direction:column;gap:10px;text-align:center;padding:16px;}
  .brand-divider{display:none;}
  .claim{align-items:center;}
}

.layout{display:grid;grid-template-columns:320px minmax(0,auto);
  gap:24px;max-width:1200px;margin:26px auto;padding:0 16px;}
@media (max-width:840px){ .layout{grid-template-columns:minmax(0,auto);} }

.ic{width:15px;height:15px;display:inline-block;vertical-align:-2px;fill:none;
  stroke:currentColor;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round;}

aside{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
  box-shadow:var(--shadow);padding:18px;align-self:start;}
aside h2{margin:0 0 4px;font-size:1.05rem;}
aside .hint{font-size:.8rem;color:var(--ink-soft);margin:0 0 14px;}
details{border-top:1px solid var(--line);}
details:first-of-type{border-top:none;}
details summary{cursor:pointer;font-weight:600;font-size:.92rem;color:var(--ink);
  padding:10px 2px;display:flex;align-items:center;gap:8px;list-style:none;}
details summary::-webkit-details-marker{display:none;}
details summary::before{content:'';width:7px;height:7px;border-right:2px solid var(--accent);
  border-bottom:2px solid var(--accent);transform:rotate(-45deg);transition:transform .15s;flex-shrink:0;}
details[open] summary::before{transform:rotate(45deg);}
.cat-count{margin-left:auto;background:var(--accent-soft);color:var(--accent);
  border-radius:999px;font-size:.72rem;padding:1px 9px;font-weight:700;}
.skill-row{display:flex;justify-content:space-between;align-items:center;
  gap:8px;padding:4px 2px 4px 15px;font-size:.88rem;}
.toggle{display:flex;gap:5px;flex-shrink:0;}
.toggle button{width:28px;height:28px;border-radius:50%;cursor:pointer;
  border:1.5px solid var(--line);background:var(--card);color:#B6BCC6;
  display:inline-flex;align-items:center;justify-content:center;transition:all .12s;padding:0;}
.toggle button:hover{border-color:#9CA3AF;color:#6B7280;}
.toggle .have.active{background:var(--ok);border-color:var(--ok);color:#fff;}
.toggle .learn.active{background:var(--accent);border-color:var(--accent);color:#fff;}
.toggle .never.active{background:var(--bad);border-color:var(--bad);color:#fff;}
.reset-btn{margin-top:16px;width:100%;padding:9px;border-radius:10px;
  border:1px solid var(--line);background:var(--card);color:var(--ink-soft);
  cursor:pointer;font-weight:600;font-size:.85rem;
  display:flex;align-items:center;justify-content:center;gap:7px;}
.reset-btn:hover{border-color:var(--accent);color:var(--accent);}

.filters{display:flex;flex-wrap:wrap;gap:10px;align-items:center;
  background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
  box-shadow:var(--shadow);padding:14px;margin-bottom:14px;}
input,select{border:1px solid var(--line);border-radius:10px;background:var(--card);
  padding:9px 12px;font-size:.9rem;color:var(--ink);font-family:inherit;}
input::placeholder{color:#9CA3AF;}
input:focus,select:focus{outline:2px solid var(--accent-soft);border-color:var(--accent);}
#fRemote,#fSalaryOnly{border:1px solid var(--line);background:var(--card);border-radius:10px;
  padding:9px 14px;cursor:pointer;font-size:.9rem;color:var(--ink-soft);
  display:inline-flex;align-items:center;gap:7px;font-family:inherit;}
#fRemote:hover,#fSalaryOnly:hover{border-color:var(--accent);color:var(--accent);}
#fRemote.on,#fSalaryOnly.on{background:var(--accent);color:#fff;border-color:var(--accent);}
.range-wrap{display:flex;align-items:center;gap:8px;font-size:.85rem;color:var(--ink-soft);}
input[type=range]{accent-color:var(--accent);padding:0;border:none;}
#stats{color:var(--ink-soft);font-size:.86rem;margin:0 4px 12px;}

.job{position:relative;background:var(--card);border:1px solid var(--line);
  border-radius:var(--radius);box-shadow:var(--shadow);padding:18px 20px;margin-bottom:14px;}
.job h3{margin:2px 0 6px;font-size:1.06rem;}
.job .meta{color:var(--ink-soft);font-size:.86rem;margin-bottom:10px;
  display:flex;flex-wrap:wrap;align-items:center;gap:6px;}
.meta .dot{width:3px;height:3px;border-radius:50%;background:#C9CDD4;}
  .meta .salary{color:var(--ok);font-weight:600;}
.job a.more{color:var(--accent);font-weight:600;text-decoration:none;
  display:inline-flex;align-items:center;gap:5px;margin-top:12px;font-size:.9rem;}
.job a.more:hover{text-decoration:underline;}
.match{float:right;border-radius:999px;font-weight:700;font-size:.78rem;
  padding:4px 12px;margin-left:10px;}
.match.high{background:var(--ok-bg);color:var(--ok);}
.match.mid{background:var(--warn-bg);color:var(--warn);}
.match.low{background:#F0F1F3;color:var(--ink-soft);}
.badge{background:var(--accent-soft);color:var(--accent);
  border-radius:999px;padding:2px 10px;font-size:.75rem;font-weight:700;}
.tag{display:inline-block;background:#F0F1F3;color:var(--ink-soft);
  border-radius:999px;padding:3px 11px;font-size:.78rem;margin:2px 4px 2px 0;}
.tag.have{background:var(--ok-bg);color:var(--ok);}
.tag.learn{background:var(--accent-soft);color:var(--accent);}
.tag.never{background:var(--bad-bg);color:var(--bad);}
.empty{text-align:center;color:var(--ink-soft);background:var(--card);
  border:1px dashed var(--line);border-radius:var(--radius);padding:44px 20px;}
footer{text-align:center;color:#9CA3AF;font-size:.8rem;padding:26px;}
</style>
</head>
<body>

<header class="brand">
  <div class="brand-inner">
    <img src="logo.png" alt="Rokuj.pl">
    <div class="brand-divider"></div>
    <div class="claim">
      <span class="l1">Praca, do której się nadajesz.</span>
      <span class="l2">Albo nadasz.</span>
    </div>
  </div>
</header>

<div class="layout">

  <aside>
    <h2>Twoje kompetencje</h2>
    <p class="hint">Oznacz: mam · mogę nabyć · nie nabędę.<br>Ponowne kliknięcie odznacza.</p>
    <div id="skills"></div>
    <button class="reset-btn" id="btnReset">
      <svg class="ic" viewBox="0 0 24 24"><path d="M3 12a9 9 0 1 0 3-6.7M3 4v5h5"/></svg>
      Resetuj profil
    </button>
  </aside>

  <main>
    <div class="filters">
      <input id="fSearch" type="text" placeholder="Stanowisko lub firma">
      <input id="fLocation" type="text" placeholder="Lokalizacja">
      <select id="fPortal"><option value="">Wszystkie portale</option></select>
      <select id="fSort">
        <option value="score">Sortuj: rokowanie</option>
        <option value="title">Sortuj: nazwa</option>
      </select>
      <button id="fRemote">
        <svg class="ic" viewBox="0 0 24 24"><path d="M3 11 12 4l9 7M5 9.5V20h14V9.5"/></svg>
        zdalnie

      </button>
      <span class="range-wrap">
        min. rokowanie
        <input id="fScore" type="range" min="0" max="100" step="5" value="0">
        <b id="fScoreVal">0%</b>
      </span>
    </div>
    <p id="stats"></p>
    <div id="jobs"></div>
  </main>

</div>

<footer>Rokuj.pl · oferty pochodzą z legalnych, publicznych źródeł</footer>

<script>
let JOBS = [];
let CATEGORIES = {};
let userSkills = {};
let openCats = {};
let remoteOnly = false;
let salaryOnly = false;

/* zamienia napis "5 000 - 7 000 zł/godz." na liczbe do sortowania (w przyblizeniu miesiecznie) */
function salaryNum(s){
  if(!s) return 0;
  const t = String(s).replace(/[\s\u00A0\u202F]/g, '');
  const m = t.match(/\d+/g);
  if(!m) return 0;
  let n = Math.max.apply(null, m.map(Number));
   if(/godz|hour/i.test(s)) n *= 168;
  else if(/tydz|week/i.test(s)) n *= 4.33;
  else if(/rok|year|annum/i.test(s)) n = Math.round(n / 12);
  return n;
}

const ICON_HAVE  = '<svg class="ic" viewBox="0 0 24 24"><path d="M4.5 12.5l5 5 10-11"/></svg>';
const ICON_LEARN = '<svg class="ic" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>';
const ICON_NEVER = '<svg class="ic" viewBox="0 0 24 24"><path d="M6 6l12 12M18 6L6 18"/></svg>';
const ICON_GO    = '<svg class="ic" viewBox="0 0 24 24"><path d="M5 12h14M13 6l6 6-6 6"/></svg>';

function saveProfile(){
  localStorage.setItem('rokujProfile', JSON.stringify(userSkills));
}
function loadProfile(){
  try{
    const raw = localStorage.getItem('rokujProfile');
    if(raw) userSkills = JSON.parse(raw) || {};
  }catch(e){ userSkills = {}; }
}

function esc(s){
  return String(s == null ? '' : s).replace(/[&<>"']/g, function(c){
    if(c === '&') return '&amp;';
    if(c === '<') return '&lt;';
    if(c === '>') return '&gt;';
    if(c === '"') return '&quot;';
    return '&#39;';
  });
}

async function load(){
  loadProfile();
  try{
    const respSkills = await fetch('/api/skills');
    CATEGORIES = await respSkills.json();
    const respJobs = await fetch('/api/jobs');
    JOBS = await respJobs.json();
  }catch(e){
    document.getElementById('jobs').innerHTML =
      '<div class="empty">Nie udało się pobrać ofert. Odśwież stronę za chwilę.</div>';
    return;
  }
  const portals = Array.from(new Set(JOBS.map(function(j){ return j.portal; }))).sort();
  let opts = '<option value="">Wszystkie portale</option>';
  for(const p of portals){ opts += '<option>' + esc(p) + '</option>'; }
  document.getElementById('fPortal').innerHTML = opts;
  renderSkills();
  renderJobs();
}

function renderSkills(){
  const present = new Set();
  for(const j of JOBS){
    const sk = j.skills || [];
    for(const s of sk) present.add(s);
  }
  let html = '';
  for(const cat of Object.keys(CATEGORIES)){
    const visible = CATEGORIES[cat].filter(function(s){ return present.has(s); });
    if(!visible.length) continue;
    const marked = visible.filter(function(s){ return userSkills[s]; }).length;
    html += '<details ' + (openCats[cat] ? 'open' : '') + ' data-cat="' + esc(cat) + '">' +
      '<summary>' + esc(cat) +
      (marked ? '<span class="cat-count">' + marked + '</span>' : '') +
      '</summary>';
    for(const s of visible){
      const st = userSkills[s] || '';
      html += '<div class="skill-row" data-skill="' + esc(s) + '">' +
        '<span>' + esc(s) + '</span>' +
        '<span class="toggle">' +
        '<button class="have '  + (st === 'have'  ? 'active' : '') + '" data-state="have"  title="Mam">' + ICON_HAVE + '</button>' +
        '<button class="learn ' + (st === 'learn' ? 'active' : '') + '" data-state="learn" title="Mogę nabyć">' + ICON_LEARN + '</button>' +
        '<button class="never ' + (st === 'never' ? 'active' : '') + '" data-state="never" title="Nie nabędę">' + ICON_NEVER + '</button>' +
        '</span></div>';
    }
    html += '</details>';
  }
  const box = document.getElementById('skills');
  box.innerHTML = html;
  const detailsList = box.querySelectorAll('details');
  for(const d of detailsList){
    d.addEventListener('toggle', function(){ openCats[d.dataset.cat] = d.open; });
  }
}

document.getElementById('skills').addEventListener('click', function(e){
  const btn = e.target.closest('button[data-state]');
  if(!btn) return;
  const row = btn.closest('.skill-row');
  setS(row.dataset.skill, btn.dataset.state);
});

function setS(skill, state){
  if(userSkills[skill] === state) delete userSkills[skill];
  else userSkills[skill] = state;
  saveProfile();
  renderSkills();
  renderJobs();
}

document.getElementById('btnReset').addEventListener('click', function(){
  if(!confirm('Na pewno wyczyścić wszystkie oznaczenia kompetencji?')) return;
  userSkills = {};
  saveProfile();
  renderSkills();
  renderJobs();
});

  function ageText(age){
  if(age == null) return '';
  if(age === 0) return 'dzisiaj';
  if(age === 1) return 'wczoraj';
  return age + ' dni temu';
}

function renderJobs(){
  const q        = document.getElementById('fSearch').value.toLowerCase().trim();
  const loc      = document.getElementById('fLocation').value.toLowerCase().trim();
  const portal   = document.getElementById('fPortal').value;
  const sortBy   = document.getElementById('fSort').value;
  const minScore = parseInt(document.getElementById('fScore').value, 10);

  const results = [];
  for(const j of JOBS){
    const sk = j.skills || [];
    let have = 0, learn = 0, blocked = false;
    for(const s of sk){
      if(userSkills[s] === 'never') blocked = true;
      else if(userSkills[s] === 'have') have += 1;
      else if(userSkills[s] === 'learn') learn += 1;
    }
    if(blocked) continue;
    const score = sk.length ? Math.round((have + learn * 0.5) / sk.length * 100) : 0;

    const hay = ((j.title || '') + ' ' + (j.company || '')).toLowerCase();
    if(q && hay.indexOf(q) === -1) continue;
    if(loc && (j.location || '').toLowerCase().indexOf(loc) === -1) continue;
    if(remoteOnly && !j.remote) continue;
    if(salaryOnly && !j.salary) continue;
    if(portal && j.portal !== portal) continue;
    if(score < minScore) continue;

    results.push({ j: j, score: score });
  }

  results.sort(function(a, b){
    if(sortBy === 'title') return a.j.title.localeCompare(b.j.title, 'pl');
         if(sortBy === 'salary') return salaryNum(b.j.salary) - salaryNum(a.j.salary);
    return b.score - a.score;
  });

  document.getElementById('stats').textContent =
    'Znaleziono ' + results.length + ' z ' + JOBS.length + ' ofert';

  const box = document.getElementById('jobs');
  if(!results.length){
    box.innerHTML = '<div class="empty">Portal w przygotowaniu – trwa integracja źródeł ofert.<br>Zapraszamy wkrótce!</div>';
    return;
  }

  let html = '';
  for(const r of results){
    const cls = r.score >= 70 ? 'high' : (r.score >= 40 ? 'mid' : 'low');
    let tags = '';
    for(const s of (r.j.skills || [])){
      tags += '<span class="tag ' + (userSkills[s] || '') + '">' + esc(s) + '</span>';
    }
    let meta = '';
    if(r.j.company){ meta += '<span>' + esc(r.j.company) + '</span><span class="dot"></span>'; }
    meta += '<span>' + esc(r.j.location || 'lokalizacja nieznana') + '</span>';
    if(r.j.remote){ meta += '<span class="dot"></span><span>zdalnie</span>'; }
    if(r.j.age != null){
      meta += '<span class="dot"></span><span>' + ageText(r.j.age) + '</span>';
    }
    meta += '<span class="dot"></span><span class="badge">' + esc(r.j.portal) + '</span>';

    html += '<div class="job ' + cls + '">' +
      '<span class="match ' + cls + '">Rokujesz na ' + r.score + '%</span>' +
      '<h3>' + esc(r.j.title) + '</h3>' +
      '<div class="meta">' + meta + '</div>' +
      '<div>' + tags + '</div>' +
      '<a class="more" href="' + esc(r.j.url) + '" target="_blank" rel="noopener">Zobacz ofertę ' + ICON_GO + '</a>' +
      '</div>';
  }
  box.innerHTML = html;
}

let debTimer = null;
function debouncedRender(){
  clearTimeout(debTimer);
  debTimer = setTimeout(renderJobs, 150);
}
document.getElementById('fSearch').addEventListener('input', debouncedRender);
document.getElementById('fLocation').addEventListener('input', debouncedRender);
document.getElementById('fPortal').addEventListener('change', renderJobs);
document.getElementById('fSort').addEventListener('change', renderJobs);
document.getElementById('fScore').addEventListener('input', function(){
  document.getElementById('fScoreVal').textContent =
    document.getElementById('fScore').value + '%';
  renderJobs();
});
document.getElementById('fRemote').addEventListener('click', function(){
  remoteOnly = !remoteOnly;
  document.getElementById('fRemote').classList.toggle('on', remoteOnly);
  renderJobs();
});

load();
</script>
</body>
</html>

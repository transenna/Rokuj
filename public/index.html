<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rokuj.pl – praca, do której się nadajesz. Albo nadasz.</title>
<style>
  :root {
    --bg: #f6f7fb; --card: #ffffff; --ink: #1e2235; --muted: #6b7280;
    --accent: #5b4df0; --line: #e8eaf1;
    --ok: #14b8a6; --warn: #f59e0b; --bad: #ef4444;
    --radius: 16px; --shadow: 0 2px 12px rgba(30,34,53,.07);
  }
  * { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI',system-ui,sans-serif; }
  body { background: var(--bg); color: var(--ink); }

  header {
    background: radial-gradient(1200px 400px at 20% -50%, #7c6cf7 0%, transparent 60%),
                linear-gradient(120deg, #241d52, #4331a8 60%, #6d3fc4);
    color:#fff; padding: 34px 24px 60px;
  }
  .head-inner { max-width:1150px; margin:0 auto; }
  .brand { display:flex; align-items:center; gap:14px; }
  .brand svg { flex-shrink:0; filter: drop-shadow(0 4px 10px rgba(0,0,0,.25)); }
  .brand h1 { font-size:2rem; letter-spacing:-.5px; font-weight:800; }
  .brand h1 span { color:#b9f4e8; }
  .tagline { margin-top:8px; opacity:.85; font-size:1.02rem; }

  .filters {
    max-width:1150px; margin:-34px auto 20px; padding:14px 16px;
    background:var(--card); border-radius:var(--radius); box-shadow:var(--shadow);
    display:flex; flex-wrap:wrap; gap:10px; align-items:center;
  }
  .filters input[type=text], .filters select {
    padding:9px 12px; border:1.5px solid var(--line); border-radius:10px;
    font-size:.9rem; outline:none; background:#fbfcfe; min-width:150px;
  }
  .filters input[type=text]:focus, .filters select:focus { border-color:var(--accent); }
  .filters .grow { flex:1; min-width:200px; }
  .chip { display:flex; align-items:center; gap:6px; font-size:.86rem; cursor:pointer;
    border:1.5px solid var(--line); border-radius:999px; padding:8px 14px; user-select:none; transition:.15s; }
  .chip.on { background:var(--accent); border-color:var(--accent); color:#fff; }
  .range-wrap { display:flex; align-items:center; gap:8px; font-size:.84rem; color:var(--muted); }

  .container { max-width:1150px; margin:0 auto 40px; padding:0 16px;
    display:grid; grid-template-columns:340px 1fr; gap:20px; }
  @media (max-width:860px){ .container{grid-template-columns:1fr;} .filters{margin:-34px 16px 20px;} }

  .panel { background:var(--card); border-radius:var(--radius); padding:20px; box-shadow:var(--shadow); align-self:start; }
  .panel h2 { font-size:1.05rem; margin-bottom:2px; }
  .hint { font-size:.8rem; color:var(--muted); margin-bottom:12px; }
  details { border-top:1px solid var(--line); }
  details summary { cursor:pointer; padding:11px 4px; font-weight:600; font-size:.92rem;
    list-style:none; display:flex; align-items:center; }
  details summary::-webkit-details-marker { display:none; }
  details summary::after { content:"▸"; color:var(--muted); transition:.2s; margin-left:auto; }
  details[open] summary::after { transform:rotate(90deg); }
  .cat-count { font-size:.72rem; background:#eef0fb; color:var(--accent);
    border-radius:999px; padding:2px 9px; font-weight:700; margin-left:8px; }
  .skill-row { display:flex; justify-content:space-between; align-items:center;
    padding:6px 4px 10px; font-size:.88rem; gap:8px; }
  .toggle { display:flex; gap:4px; flex-shrink:0; }
  .toggle button { border:1.5px solid var(--line); background:#fff; border-radius:8px;
    padding:3px 9px; cursor:pointer; font-size:.8rem; transition:.15s; }
  .toggle button:hover { border-color:#c9cde0; }
  .toggle .have.active  { background:var(--ok);  border-color:var(--ok);  color:#fff; }
  .toggle .learn.active { background:var(--warn); border-color:var(--warn); color:#fff; }
  .toggle .never.active { background:var(--bad);  border-color:var(--bad);  color:#fff; }
  .reset { margin-top:12px; width:100%; padding:9px; border:none; border-radius:10px;
    background:#eef0fb; color:var(--accent); font-weight:600; cursor:pointer; }
  .reset:hover { background:#e2e5f8; }

  .stats { font-size:.86rem; color:var(--muted); margin-bottom:12px; }
  .job { background:var(--card); border-radius:var(--radius); padding:18px 20px;
    margin-bottom:12px; box-shadow:var(--shadow); transition:.15s; border-left:4px solid transparent; }
  .job:hover { transform:translateY(-2px); }
  .job.high { border-left-color:var(--ok); } .job.mid { border-left-color:var(--warn); }
  .job h3 { font-size:1.02rem; padding-right:130px; }
  .meta { color:var(--muted); font-size:.84rem; margin-top:3px; }
  .badge { font-size:.7rem; padding:3px 10px; border-radius:999px; background:#eef0fb; color:var(--accent); font-weight:700; }
  .match { float:right; font-weight:800; font-size:.9rem; padding:5px 12px; border-radius:999px; }
  .match.high { background:#d8f5f0; color:#0f766e; }
  .match.mid  { background:#fdf0d5; color:#92400e; }
  .match.low  { background:#f0f1f5; color:var(--muted); }
  .tag { display:inline-block; font-size:.74rem; padding:2px 10px; border-radius:999px;
    border:1px solid var(--line); margin:7px 4px 0 0; background:#fbfcfe; }
  .tag.have  { background:#d8f5f0; border-color:#8fe3d7; color:#0f766e; }
  .tag.learn { background:#fdf0d5; border-color:#f5d489; color:#92400e; }
  .job a { display:inline-block; margin-top:10px; font-size:.85rem; color:var(--accent);
    text-decoration:none; font-weight:700; }
  .job a:hover { text-decoration:underline; }
  .empty { text-align:center; color:var(--muted); padding:48px 20px;
    background:var(--card); border-radius:var(--radius); box-shadow:var(--shadow); }
</style>
</head>
<body>

<header>
  <div class="head-inner">
    <div class="brand">
      <svg width="52" height="52" viewBox="0 0 52 52">
        <rect x="1" y="1" width="50" height="50" rx="14" fill="rgba(255,255,255,.12)" stroke="rgba(255,255,255,.35)" stroke-width="1.5"/>
        <rect x="10" y="30" width="6" height="11" rx="2" fill="#8fa2ff"/>
        <rect x="20" y="24" width="6" height="17" rx="2" fill="#b9c4ff"/>
        <rect x="30" y="17" width="6" height="24" rx="2" fill="#ffffff"/>
        <path d="M11 22 L28 13 L40 8" fill="none" stroke="#5eead4" stroke-width="3" stroke-linecap="round"/>
        <path d="M33 7 L41 7.5 L38 15" fill="none" stroke="#5eead4" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <h1>rokuj<span>.pl</span></h1>
    </div>
    <p class="tagline">Praca, do której się nadajesz. <strong>Albo nadasz.</strong></p>
  </div>
</header>

<div class="filters">
  <input type="text" id="fSearch" class="grow" placeholder="🔍 Szukaj: stanowisko, firma...">
  <input type="text" id="fLocation" placeholder="📍 Lokalizacja">
  <label class="chip" id="fRemote">🏠 Praca zdalna</label>
  <select id="fPortal"><option value="">Wszystkie portale</option></select>
  <select id="fSort">
    <option value="score">Sortuj: rokowanie</option>
    <option value="title">Sortuj: A–Z</option>
  </select>
  <span class="range-wrap">min. <input type="range" id="fScore" min="0" max="100" step="10" value="0"><b id="fScoreVal">0%</b></span>
</div>

<div class="container">

  <aside class="panel">
    <h2>Twoje kompetencje</h2>
    <p class="hint">✔ mam · 📚 mogę nabyć · ✖ nie nabędę<br>Kliknij ponownie, aby odznaczyć. Profil zapisuje się automatycznie.</p>
    <div id="skills"></div>
    <button class="reset" onclick="resetProfile()">Wyczyść profil</button>
  </aside>

  <main>
    <div class="stats" id="stats">Ładowanie ofert...</div>
    <div id="jobs"></div>
  </main>

</div>

<script>
let JOBS = [], CATEGORIES = {}, userSkills = {};
let remoteOnly = false;
let openCats = {};   // pamięta, które kategorie są rozwinięte

function saveProfile() { localStorage.setItem('rokuj_profile', JSON.stringify(userSkills)); }
function loadProfile() {
  try { userSkills = JSON.parse(localStorage.getItem('rokuj_profile')) || {}; }
  catch { userSkills = {}; }
}
function resetProfile() {
  userSkills = {};
  saveProfile();
  renderSkills();
  renderJobs();
}

async function load() {
  loadProfile();
  try {
    const [jobsResp, skillsResp] = await Promise.all([
      fetch('/api/jobs'),
      fetch('/api/skills')
    ]);

    if (!jobsResp.ok) throw new Error(`jobs HTTP ${jobsResp.status}`);
    if (!skillsResp.ok) throw new Error(`skills HTTP ${skillsResp.status}`);

    JOBS = await jobsResp.json();
    CATEGORIES = await skillsResp.json();

  } catch (e) {
    console.error("LOAD ERROR:", e);
    document.getElementById('stats').textContent = 'Błąd pobierania ofert. Zobacz Console (F12).';
    return;
  }

  const portals = [...new Set(JOBS.map(j => j.portal))].sort();
  document.getElementById('fPortal').innerHTML =
    '<option value="">Wszystkie portale</option>' +
    portals.map(p => `<option>${p}</option>`).join('');

  renderSkills();
  renderJobs();
}

function renderSkills() {
  const present = new Set(JOBS.flatMap(j => j.skills));
  let html = '';

  for (const [cat, skills] of Object.entries(CATEGORIES)) {
    const visible = skills.filter(s => present.has(s));
    if (!visible.length) continue;

    const marked = visible.filter(s => userSkills[s]).length;

    html += `<details ${openCats[cat] ? 'open' : ''} data-cat="${cat}">
      <summary>${cat}${marked ? `<span class="cat-count">${marked}</span>` : ''}</summary>
      ${visible.map(s => `
        <div class="skill-row">
          <span>${s}</span>
          <span class="toggle">
            <button class="have ${userSkills[s]==='have'?'active':''}"  onclick="setS('${s}','have')"  title="Mam">✔</button>
            <button class="learn ${userSkills[s]==='learn'?'active':''}" onclick="setS('${s}','learn')" title="Mogę nabyć">📚</button>
            <button class="never ${userSkills[s]==='never'?'active':''}" onclick="setS('${s}','never')" title="Nie nabędę">✖</button>
          </span>
        </div>`).join('')}
    </details>`;
  }

  document.getElementById('skills').innerHTML = html;

  document.querySelectorAll('#skills details').forEach(d => {
    d.addEventListener('toggle', () => { openCats[d.dataset.cat] = d.open; });
  });
}

function setS(skill, state) {
  userSkills[skill] = userSkills[skill] === state ? undefined : state;
  saveProfile();
  renderSkills();
  renderJobs();
}

function renderJobs() {
  const q        = document.getElementById('fSearch').value.toLowerCase().trim();
  const loc      = document.getElementById('fLocation').value.toLowerCase().trim();
  const portal   = document.getElementById('fPortal').value;
  const sortBy   = document.getElementById('fSort').value;
  const minScore = parseInt(document.getElementById('fScore').value);

  const results = JOBS.map(j => {
    let have = 0, learn = 0, blocked = false;
    j.skills.forEach(s => {
      if (userSkills[s] === 'never') blocked = true;
      else if (userSkills[s] === 'have') have++;
      else if (userSkills[s] === 'learn') learn++;
    });

    const score = j.skills.length
      ? Math.round((have + learn * 0.5) / j.skills.length * 100)
      : 0;

    return { j, blocked, score };
  })
  .filter(r => !r.blocked)
  .filter(r => !q      || (r.j.title + ' ' + r.j.company).toLowerCase().includes(q))
  .filter(r => !loc    || (r.j.location || '').toLowerCase().includes(loc))
  .filter(r => !remoteOnly || r.j.remote)
  .filter(r => !portal || r.j.portal === portal)
  .filter(r => r.score >= minScore);

  results.sort((a, b) => sortBy === 'title'
    ? a.j.title.localeCompare(b.j.title, 'pl')
    : b.score - a.score
  );

  document.getElementById('stats').textContent =
    `Znaleziono ${results.length} z ${JOBS.length} ofert`;

  if (!results.length) {
    document.getElementById('jobs').innerHTML =
      '<div class="empty">Brak pasujących ofert 😕<br>Poluzuj filtry lub zmień ustawienia kompetencji.</div>';
    return;
  }

  document.getElementById('jobs').innerHTML = results.map(r => {
    const cls = r.score >= 70 ? 'high' : r.score >= 40 ? 'mid' : 'low';
    const tags = r.j.skills.map(s => `<span class="tag ${userSkills[s]||''}">${s}</span>`).join('');

    return `
      <div class="job ${cls}">
        <span class="match ${cls}">Rokujesz na ${r.score}%</span>
        <h3>${r.j.title}</h3>
        <div class="meta">${r.j.company} · ${r.j.location || 'lokalizacja nieznana'} · <span class="badge">${r.j.portal}</span></div>
        <div>${tags}</div>
        <a href="${r.j.url}" target="_blank" rel="noopener">Zobacz ofertę →</a>
      </div>`;
  }).join('');
}

// nasłuchiwanie filtrów
document.getElementById('fSearch').addEventListener('input', renderJobs);
document.getElementById('fLocation').addEventListener('input', renderJobs);
document.getElementById('fPortal').addEventListener('change', renderJobs);
document.getElementById('fSort').addEventListener('change', renderJobs);

document.getElementById('fScore').addEventListener('input', () => {
  document.getElementById('fScoreVal').textContent = document.getElementById('fScore').value + '%';
  renderJobs();
});

document.getElementById('fRemote').addEventListener('click', () => {
  remoteOnly = !remoteOnly;
  document.getElementById('fRemote').classList.toggle('on', remoteOnly);
  renderJobs();
});

load();
</script>

</body>
</html>

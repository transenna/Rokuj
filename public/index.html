<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rokuj.pl – Praca, do której się nadajesz. Albo nadasz</title>
<link rel="icon" href="logo.png">
<style>
:root{
  --pomarancz:#F26B1D;
  --pomarancz-jasny:#FFB340;
  --bordo:#6E1A0E;
  --czern:#1C1917;
  --tlo:#FFF8F2;
  --ramka:#F3E3D7;
}
*{box-sizing:border-box;}
body{
  margin:0;
  font-family:'Segoe UI',system-ui,Arial,sans-serif;
  background:var(--tlo);
  color:var(--czern);
}

/* ---------- NAGŁÓWEK ---------- */
header.brand{
  display:flex;align-items:center;gap:18px;flex-wrap:wrap;
  padding:18px 24px;background:#fff;
  border-bottom:3px solid var(--pomarancz);
  box-shadow:0 2px 12px rgba(110,26,14,.06);
}
header.brand img{height:56px;max-width:100%;}
header.brand .claim{
  margin:0;color:var(--bordo);font-size:1.05rem;font-weight:600;
}

/* ---------- UKŁAD ---------- */
.layout{
  display:grid;grid-template-columns:320px minmax(0,auto);
  gap:22px;max-width:1200px;margin:22px auto;padding:0 16px;
}
@media (max-width:820px){ .layout{grid-template-columns:minmax(0,auto);} }

/* ---------- PANEL KOMPETENCJI ---------- */
aside{
  background:#fff;border:1px solid var(--ramka);border-radius:14px;
  padding:16px;align-self:start;
}
aside h2{margin:0 0 4px;font-size:1.15rem;color:var(--bordo);}
aside .hint{font-size:.82rem;color:#8a7a70;margin:0 0 12px;}
details{border-bottom:1px solid var(--ramka);padding:6px 0;}
details summary{
  cursor:pointer;font-weight:700;color:var(--bordo);
  padding:6px 2px;list-style-position:inside;
}
.cat-count{
  background:var(--pomarancz);color:#fff;border-radius:999px;
  font-size:.72rem;padding:2px 8px;margin-left:8px;font-weight:700;
}
.skill-row{
  display:flex;justify-content:space-between;align-items:center;
  gap:8px;padding:5px 2px;font-size:.9rem;
}
.toggle{display:flex;gap:4px;flex-shrink:0;}
.toggle button{
  border:1px solid var(--ramka);background:#fff;border-radius:8px;
  width:30px;height:28px;cursor:pointer;font-size:.85rem;
}
.toggle button:hover{border-color:var(--pomarancz);}
.toggle .have.active{background:#2E9E44;color:#fff;border-color:#2E9E44;}
.toggle .learn.active{background:var(--pomarancz-jasny);color:var(--czern);border-color:var(--pomarancz-jasny);}
.toggle .never.active{background:#9C2413;color:#fff;border-color:#9C2413;}
.reset-btn{
  margin-top:14px;width:100%;padding:9px;border-radius:10px;
  border:1px solid var(--ramka);background:#fff;color:var(--bordo);
  cursor:pointer;font-weight:600;
}
.reset-btn:hover{background:#FBE3E0;}

/* ---------- FILTRY ---------- */
.filters{
  display:flex;flex-wrap:wrap;gap:10px;align-items:center;
  background:#fff;border:1px solid var(--ramka);border-radius:14px;
  padding:14px;margin-bottom:16px;
}
input,select{
  border:1px solid #E8D8CC;border-radius:10px;background:#fff;
  padding:9px 12px;font-size:.92rem;color:var(--czern);
}
input:focus,select:focus{outline:2px solid var(--pomarancz-jasny);border-color:var(--pomarancz);}
#fRemote{
  border:1px solid #E8D8CC;background:#fff;border-radius:10px;
  padding:9px 14px;cursor:pointer;font-size:.92rem;
}
#fRemote.on{background:var(--pomarancz);color:#fff;border-color:var(--pomarancz);}
.range-wrap{display:flex;align-items:center;gap:8px;font-size:.88rem;color:var(--bordo);}
input[type=range]{accent-color:var(--pomarancz);padding:0;}
#stats{color:#8a7a70;font-size:.9rem;margin:0 4px 12px;}

/* ---------- OFERTY ---------- */
.job{
  position:relative;background:#fff;border:1px solid var(--ramka);
  border-left:5px solid var(--pomarancz);border-radius:12px;
  box-shadow:0 2px 10px rgba(110,26,14,.07);
  padding:16px 18px;margin-bottom:14px;
}
.job.high{border-left-color:#2E9E44;}
.job.mid{border-left-color:var(--pomarancz-jasny);}
.job.low{border-left-color:#C9BEB8;}
.job h3{margin:4px 0 6px;font-size:1.08rem;}
.job .meta{color:#8a7a70;font-size:.88rem;margin-bottom:10px;}
.job a{color:var(--pomarancz);font-weight:600;text-decoration:none;display:inline-block;margin-top:10px;}
.job a:hover{color:var(--bordo);}
.match{
  float:right;border-radius:999px;font-weight:700;font-size:.8rem;
  padding:4px 12px;margin-left:10px;
}
.match.high{background:#E7F6EA;color:#1F7A33;}
.match.mid{background:#FFF1DC;color:#B25E00;}
.match.low{background:#F1ECE9;color:#7A6F69;}
.badge{
  background:linear-gradient(135deg,var(--pomarancz-jasny),var(--pomarancz));
  color:#fff;border-radius:999px;padding:2px 10px;font-size:.78rem;font-weight:600;
}
.tag{
  display:inline-block;background:#F6EEE8;border-radius:999px;
  padding:3px 10px;font-size:.8rem;margin:2px 4px 2px 0;
}
.tag.have{background:#E7F6EA;color:#1F7A33;}
.tag.learn{background:#FFF1DC;color:#B25E00;}
.tag.never{background:#FBE3E0;color:#9C2413;}
.empty{
  text-align:center;color:var(--bordo);background:#fff;
  border:1px dashed var(--pomarancz-jasny);border-radius:14px;padding:40px 20px;
}
footer{
  text-align:center;color:#8a7a70;font-size:.82rem;padding:24px;
}
</style>
</head>
<body>

<header class="brand">
  <img src="logo.png" alt="Rokuj.pl">
  <p class="claim">Praca, do której się nadajesz. Albo nadasz.</p>
</header>

<div class="layout">

  <aside>
    <h2>Twoje kompetencje</h2>
    <p class="hint">✔ mam &nbsp;·&nbsp; 📚 mogę nabyć &nbsp;·&nbsp; ✖ nie nabędę<br>Ponowne kliknięcie odznacza.</p>
    <div id="skills"></div>
    <button class="reset-btn" id="btnReset">🔄 Resetuj profil</button>
  </aside>

  <main>
    <div class="filters">
      <input id="fSearch" type="text" placeholder="🔍 Szukaj stanowiska lub firmy">
      <input id="fLocation" type="text" placeholder="📍 Lokalizacja">
      <select id="fPortal"><option value="">Wszystkie portale</option></select>
      <select id="fSort">
        <option value="score">Sortuj: rokowanie</option>
        <option value="title">Sortuj: nazwa</option>
      </select>
      <button id="fRemote">🏠 zdalnie</button>
      <span class="range-wrap">
        min. rokowanie
        <input id="fScore" type="range" min="0" max="100" step="5" value="0">
        <b id="fScoreVal">0%</b>
      </span>
    </div>
    <p id="stats"></p>
    <div id="jobs"></div>
  </main>

</div>

<footer>Rokuj.pl · oferty pochodzą z legalnych, publicznych źródeł</footer>

<script>
let JOBS = [];
let CATEGORIES = {};
let userSkills = {};
let openCats = {};
let remoteOnly = false;

/* ---------- profil w localStorage ---------- */
function saveProfile(){
  localStorage.setItem('rokujProfile', JSON.stringify(userSkills));
}
function loadProfile(){
  try{
    const raw = localStorage.getItem('rokujProfile');
    if(raw) userSkills = JSON.parse(raw) || {};
  }catch(e){ userSkills = {}; }
}

/* ---------- bezpieczne wstawianie tekstu ---------- */
function esc(s){
  return String(s == null ? '' : s).replace(/[&<>"']/g, function(c){
    if(c === '&') return '&amp;';
    if(c === '<') return '&lt;';
    if(c === '>') return '&gt;';
    if(c === '"') return '&quot;';
    return '&#39;';
  });
}

/* ---------- start ---------- */
async function load(){
  loadProfile();
  try{
    const respSkills = await fetch('/api/skills');
    CATEGORIES = await respSkills.json();
    const respJobs = await fetch('/api/jobs');
    JOBS = await respJobs.json();
  }catch(e){
    document.getElementById('jobs').innerHTML =
      '<div class="empty">Nie udało się pobrać ofert. Odśwież stronę za chwilę. 🔄</div>';
    return;
  }
  const portals = Array.from(new Set(JOBS.map(function(j){ return j.portal; }))).sort();
  let opts = '<option value="">Wszystkie portale</option>';
  for(const p of portals){ opts += '<option>' + esc(p) + '</option>'; }
  document.getElementById('fPortal').innerHTML = opts;
  renderSkills();
  renderJobs();
}

/* ---------- panel kompetencji ---------- */
function renderSkills(){
  const present = new Set();
  for(const j of JOBS){
    const sk = j.skills || [];
    for(const s of sk) present.add(s);
  }

  let html = '';
  for(const cat of Object.keys(CATEGORIES)){
    const visible = CATEGORIES[cat].filter(function(s){ return present.has(s); });
    if(!visible.length) continue;
    const marked = visible.filter(function(s){ return userSkills[s]; }).length;
    html += '<details ' + (openCats[cat] ? 'open' : '') + ' data-cat="' + esc(cat) + '">' +
      '<summary>' + esc(cat) +
      (marked ? '<span class="cat-count">' + marked + '</span>' : '') +
      '</summary>';
    for(const s of visible){
      const st = userSkills[s] || '';
      html += '<div class="skill-row" data-skill="' + esc(s) + '">' +
        '<span>' + esc(s) + '</span>' +
        '<span class="toggle">' +
        '<button class="have '  + (st === 'have'  ? 'active' : '') + '" data-state="have"  title="Mam">✔</button>' +
        '<button class="learn ' + (st === 'learn' ? 'active' : '') + '" data-state="learn" title="Mogę nabyć">📚</button>' +
        '<button class="never ' + (st === 'never' ? 'active' : '') + '" data-state="never" title="Nie nabędę">✖</button>' +
        '</span></div>';
    }
    html += '</details>';
  }
  const box = document.getElementById('skills');
  box.innerHTML = html;
  const detailsList = box.querySelectorAll('details');
  for(const d of detailsList){
    d.addEventListener('toggle', function(){ openCats[d.dataset.cat] = d.open; });
  }
}

/* delegacja klików na przyciskach kompetencji */
document.getElementById('skills').addEventListener('click', function(e){
  const btn = e.target.closest('button[data-state]');
  if(!btn) return;
  const row = btn.closest('.skill-row');
  setS(row.dataset.skill, btn.dataset.state);
});

function setS(skill, state){
  if(userSkills[skill] === state) delete userSkills[skill];
  else userSkills[skill] = state;
  saveProfile();
  renderSkills();
  renderJobs();
}

/* reset profilu */
document.getElementById('btnReset').addEventListener('click', function(){
  if(!confirm('Na pewno wyczyścić wszystkie oznaczenia kompetencji?')) return;
  userSkills = {};
  saveProfile();
  renderSkills();
  renderJobs();
});

/* ---------- oferty ---------- */
function renderJobs(){
  const q        = document.getElementById('fSearch').value.toLowerCase().trim();
  const loc      = document.getElementById('fLocation').value.toLowerCase().trim();
  const portal   = document.getElementById('fPortal').value;
  const sortBy   = document.getElementById('fSort').value;
  const minScore = parseInt(document.getElementById('fScore').value, 10);

  const results = [];
  for(const j of JOBS){
    const sk = j.skills || [];
    let have = 0, learn = 0, blocked = false;
    for(const s of sk){
      if(userSkills[s] === 'never') blocked = true;
      else if(userSkills[s] === 'have') have += 1;
      else if(userSkills[s] === 'learn') learn += 1;
    }
    if(blocked) continue;
    const score = sk.length ? Math.round((have + learn * 0.5) / sk.length * 100) : 0;

    const hay = ((j.title || '') + ' ' + (j.company || '')).toLowerCase();
    if(q && hay.indexOf(q) === -1) continue;
    if(loc && (j.location || '').toLowerCase().indexOf(loc) === -1) continue;
    if(remoteOnly && !j.remote) continue;
    if(portal && j.portal !== portal) continue;
    if(score < minScore) continue;

    results.push({ j: j, score: score });
  }

  results.sort(function(a, b){
    if(sortBy === 'title') return a.j.title.localeCompare(b.j.title, 'pl');
    return b.score - a.score;
  });

  document.getElementById('stats').textContent =
    'Znaleziono ' + results.length + ' z ' + JOBS.length + ' ofert';

  const box = document.getElementById('jobs');
  if(!results.length){
    box.innerHTML = '<div class="empty">Brak pasujących ofert 😕<br>Poluzuj filtry lub zmień ustawienia kompetencji.</div>';
    return;
  }

  let html = '';
  for(const r of results){
    const cls = r.score >= 70 ? 'high' : (r.score >= 40 ? 'mid' : 'low');
    let tags = '';
    for(const s of (r.j.skills || [])){
      tags += '<span class="tag ' + (userSkills[s] || '') + '">' + esc(s) + '</span>';
    }
    const metaParts = [];
    if(r.j.company) metaParts.push(esc(r.j.company));
    metaParts.push(esc(r.j.location || 'lokalizacja nieznana'));
    if(r.j.remote) metaParts.push('🏠 zdalnie');

    html += '<div class="job ' + cls + '">' +
      '<span class="match ' + cls + '">Rokujesz na ' + r.score + '%</span>' +
      '<h3>' + esc(r.j.title) + '</h3>' +
      '<div class="meta">' + metaParts.join(' · ') +
      ' · <span class="badge">' + esc(r.j.portal) + '</span></div>' +
      '<div>' + tags + '</div>' +
      '<a href="' + esc(r.j.url) + '" target="_blank" rel="noopener">Zobacz ofertę →</a>' +
      '</div>';
  }
  box.innerHTML = html;
}

/* ---------- filtry ---------- */
let debTimer = null;
function debouncedRender(){
  clearTimeout(debTimer);
  debTimer = setTimeout(renderJobs, 150);
}
document.getElementById('fSearch').addEventListener('input', debouncedRender);
document.getElementById('fLocation').addEventListener('input', debouncedRender);
document.getElementById('fPortal').addEventListener('change', renderJobs);
document.getElementById('fSort').addEventListener('change', renderJobs);
document.getElementById('fScore').addEventListener('input', function(){
  document.getElementById('fScoreVal').textContent =
    document.getElementById('fScore').value + '%';
  renderJobs();
});
document.getElementById('fRemote').addEventListener('click', function(){
  remoteOnly = !remoteOnly;
  document.getElementById('fRemote').classList.toggle('on', remoteOnly);
  renderJobs();
});

load();
</script>
</body>
</html>
